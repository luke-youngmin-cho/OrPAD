appId: com.orpad.app
productName: OrPAD
asar: true
asarUnpack:
  - "node_modules/**/*.node"
  - "node_modules/@homebridge/node-pty-prebuilt-multiarch/**"
compression: maximum
electronLanguages:
  - en-US
  - ko
  - zh-CN
  - zh-TW
  - ja
  - de
  - fr
  - es
  - pt-BR
  - ru
directories:
  output: release
  buildResources: assets
files:
  - src/main/**/*
  - src/renderer/**/*
  - src/locales/**/*
  - dist/**/*
  - package.json
  - "!node_modules/**/test/**"
  - "!node_modules/**/tests/**"
  - "!node_modules/**/*.md"
  - "!node_modules/**/*.map"
  - "!node_modules/**/LICENSE*"
  - "!node_modules/**/CHANGELOG*"
  - "!node_modules/**/docs/**"
  - "!node_modules/**/examples/**"
  - "!node_modules/**/.github/**"
  - "!node_modules/**/*.ts"
  - "!node_modules/**/build/**/*.iobj"
  - "!node_modules/**/build/**/*.ipdb"
  - "!node_modules/**/build/**/*.tlog"
  - "!node_modules/**/build/**/*.obj"
extraMetadata:
  main: src/main/main.js
win:
  target:
    - target: nsis
      arch:
        - x64
mac:
  target:
    - target: dmg
      arch:
        - universal
  category: public.app-category.developer-tools
  icon: assets/icon.icns
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
  darkModeSupport: true
dmg:
  sign: false
  writeUpdateInfo: false
nsis:
  artifactName: "${productName}-Setup-${version}.${ext}"
  oneClick: false
  createDesktopShortcut: true
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  runAfterFinish: true
  multiLanguageInstaller: true
  displayLanguageSelector: true
  installerLanguages:
    - en_US
    - ko_KR
    - zh_CN
    - zh_TW
    - ja_JP
    - de_DE
    - fr_FR
    - es_ES
    - pt_BR
    - ru_RU
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  installerHeaderIcon: assets/icon.ico
protocols:
  - name: OrPAD Protocol
    schemes:
      - orpad
fileAssociations:
  - ext: md
    name: Markdown File
    description: Markdown Document
  - ext: markdown
    name: Markdown File
    description: Markdown Document
  - ext: mdx
    name: MDX File
    description: MDX Document
  - ext: mmd
    name: Mermaid Diagram
    description: Mermaid Diagram
  - ext: json
    name: JSON File
    description: JSON Document
  - ext: yaml
    name: YAML File
    description: YAML Document
  - ext: yml
    name: YAML File
    description: YAML Document
  - ext: toml
    name: TOML File
    description: TOML Document
  - ext: xml
    name: XML File
    description: XML Document
  - ext: csv
    name: CSV File
    description: CSV Document
  - ext: tsv
    name: TSV File
    description: TSV Document
  - ext: html
    name: HTML File
    description: HTML Document
  - ext: htm
    name: HTML File
    description: HTML Document
  - ext: env
    name: Env File
    description: Environment File
  - ext: ini
    name: INI File
    description: INI Configuration File
  - ext: conf
    name: Conf File
    description: Configuration File
  - ext: properties
    name: Properties File
    description: Java Properties File
  - ext: log
    name: Log File
    description: Log File
  - ext: txt
    name: Text File
    description: Plain Text Document
